---
layout: default
title: "Gestionar Responsables"
permalink: /responsible-management
---

<div class="container-scroller">

    {% include container.html %}


    {% include navbarTop.html %}

    <div class="container-fluid page-body-wrapper">

        {% include navbarSide.html %}

        <div class="main-panel">
            <div class="content-wrapper">
                <div class="row">
                    <div class="col-12">
                        <div class="card">
                            <div class="card-body">
                                <!-- TITULO -->
                                <h4 class="card-title">Responsables</h4>
                                <!-- MENU TABLA INI-->
                                <div class="d-flex table-responsive">
                                    <div class="btn-group mr-2" th:if="${user.typeuser} == 'admin'">
                                        <a class="btn btn-sm btn-primary" href="/register-responsible" role="tab"
                                           aria-controls="home-2" aria-selected="true">
                                            <i class="mdi mdi-plus-circle-outline"></i> Crear
                                        </a>
                                    </div>
                                    <div class="btn-group mr-2">
                                        <button type="button" class="btn btn-light"><i
                                                class="mdi mdi-alert-circle-outline"></i></button>
                                    </div>
                                    <div class="btn-group mr-2">
                                        <button type="button" class="btn btn-light"><i class="mdi mdi-printer"></i>
                                        </button>
                                    </div>
                                    <div class="btn-group">
                                        <button type="button" class="btn btn-light"><i class="mdi mdi-cloud"></i>
                                        </button>
                                        <button type="button" class="btn btn-light"><i
                                                class="mdi mdi-dots-vertical"></i></button>
                                    </div>
                                </div>
                                <!-- MENU TABLA FIN-->
                                <!--TABLA INI-->
                                <div class="table-responsive" style="padding-top: 20px;">
                                    <table id="order-listing" class="table">
                                        <thead>
                                        <tr>
                                            <th>Id</th>
                                            <th>Nombre</th>
                                            <th>Email</th>
                                            <th>Habilitado</th>
                                            <th></th>
                                            <th></th>
                                        </tr>
                                        </thead>
                                        <tbody>
                                        <tr  th:each="data : ${responsibleList}">
                                            <th scope="row" th:text="${data.id}">Id</th>
                                            <td th:text="${data.name}">nombre</td>
                                            <td th:text="${data.email}">email</td>
                                            <td th:text="${data.enabled} ? 'SI' : 'NO'">K</td>
                                            <td>
                                                <div>
                                                    <form  th:action="@{/editResponsible(id=${data.id})}" th:if="${user.typeuser} == 'superadmin'" method="post">
                                                        <button type="submit" class="btn btn-warning">EDITAR</button>
                                                    </form>
                                                </div>
                                            </td>
                                            <td>
                                                <div>
                                                    <form  th:action="@{/delete_responsible(id=${data.id})}" th:if="${user.typeuser} == 'superadmin'" method="post">
                                                        <button  type="submit" class="btn btn-danger">ELIMINAR</button>
                                                    </form>
                                                </div>
                                            </td>
                                        </tr>
                                        </tbody>
                                    </table>
                                </div>
                                <!--TABLA FIN-->
                            </div>
                        </div>
                    </div>
                </div>
                {% include footer.html %}
            </div>
        </div>
    </div>
</div>
