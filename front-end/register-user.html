---
layout: default
title: "Registro de Usuarios"
permalink: /register
---

<div class="container-scroller">

    {% include container.html %}
    {% include navbarTop.html %}

    <div class="container-fluid page-body-wrapper">

        {% include navbarSide.html %}

        <div class="main-panel">
            <div class="content-wrapper">

                <div class="row grid-margin">
                    <div class="col-12 grid-margin">
                        <div class="card">
                            <div class="card-body">

                                <h4 class="card-title">Registro de Usuarios</h4>
                                <div class="alert alert-info text-center" th:if="${message}" th:text="${message}"></div>

                                <form class="cmxform" id="formRegUser" method="post"  th:action="@{/register}"  th:object="${userDTO}">
                                    <fieldset>
                                        <div class="form-group">
                                            <label for="firstname">Nombre</label>
                                            <input id="firstname" class="form-control" name="firstname" type="text" th:value="*{firstname}">
                                        </div>
                                        <div class="form-group">
                                            <label for="lastname">Apellido</label>
                                            <input id="lastname" class="form-control" name="lastname" type="text" th:value="*{lastname}">
                                        </div>
                                        <div class="form-group">
                                            <label for="username">Nombre de Usuario</label>
                                            <input id="username" class="form-control" name="username" type="text" th:value="*{username}" th:errorClass="is-invalid">
                                            <div th:if="${#fields.hasErrors('username')}" th:errors="*{username}" class="invalid-feedback"></div>
                                        </div>
                                        <div class="form-group">
                                            <label for="password">Contraseña</label>
                                            <input id="password" class="form-control" name="password" type="password" th:value="*{password}">
                                        </div>
                                        <div class="form-group">
                                            <label for="rpassword">Confirmar Contraseña</label>
                                            <input id="rpassword" class="form-control" name="rpassword" type="password" th:value="*{rpassword}">
                                            <div th:if="${#fields.hasErrors('rpassword')}" th:errors="*{rpassword}" class="invalid-feedback"></div>
                                        </div>
                                        <div class="form-group">
                                            <label for="typeuser">Perfil</label>
                                            <select class="form-control form-control-sm"
                                                    id="typeuser" th:value="*{typeuser}"
                                                    name="typeuser">
                                                <option th:each="data:${typeuser}"
                                                        th:text="${data.type}"></option>
                                            </select>
                                        </div>
                                        <input id="btn_save_user" class="btn btn-info mb-2" value="Guardar">
<!--                                        <button id="btn_save_user" class="btn btn-info mb-2" >Guardar</button>-->
                                    </fieldset>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            {% include footer.html %}
        </div>
    </div>
</div>
