---
layout: default
title: "Registro Responsable"
permalink: /register-store
---

<div class="container-scroller">

    {% include container.html %}


    {% include navbarTop.html %}

    <div class="container-fluid page-body-wrapper">

        {% include navbarSide.html %}

        <div class="main-panel">
            <div class="content-wrapper">

                <div class="row grid-margin">
                    <div class="col-12 grid-margin">
                        <div class="card">
                            <div class="card-body">

                                <h4 class="card-title">Registro de Bodega</h4>


                                <form id="basicform" class="form-sample" method="post" th:action="@{/register-store}"
                                      th:object="${storeDTO}">
                                    <p class="card-description">

                                    </p>
                                    <!--Serial & Descripcion-->
                                    <div class="row">
                                        <div class="col-md-6">
                                            <div class="form-group row">
                                                <label for="name" class="col-sm-3 col-form-label">Nombre: <label id="lb_name" class="required-text"></label></label>
                                                <div class="col-sm-9">
                                                    <input type="text" id="name" class="form-control" name="name" th:value="*{name}" th:errorClass="is-invalid">
                                                </div>
                                            </div>
                                        </div>

                                        <div class="col-md-6">
                                            <div class="form-group row">
                                                <label for="enabled" class="col-sm-3 col-form-label">Habilitado: <label id="lb_enabled" class="required-text"></label></label>
                                                <div class="col-sm-9">


                                                    <select id="enabled" class="form-select" style="width:100%" th:value="*{enabled}" name="enabled" required>
                                                        <option value="TRUE">SI</option>
                                                        <option value="FALSE">NO</option>
                                                    </select>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                    <button type="submit" class="btn btn-success mb-2">Guardar</button>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            {% include footer.html %}
        </div>
    </div>
</div>
