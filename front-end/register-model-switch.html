---
layout: default
title: "Modelo AP"
permalink: /register-model-switch
---

{% include navbarTop.html %}

<div>
    <div id="layoutSidenav">
        <div id="layoutSidenav_nav">
            {% include navbarSide.html %}
        </div>
        <div id="layoutSidenav_content">
            <main>
                <div class="container-fluid px-4">
                    <ol class="breadcrumb mb-4">
                        <li class="breadcrumb-item"><a href="/authenticated">Dashboard</a></li>
                        <li class="breadcrumb-item"><a href="/modelswitch">Modelos de Switch</a></li>
                        <li class="breadcrumb-item active">Registrar Modelo</li>
                    </ol>
                </div>
                <div class="container">
                    <div class="card-body" style="padding-top: 0px;">
                        <div class="row justify-content-center">
                            <div class="card px-0 pt-4 pb-0 mb-3">
                                <form id="basicform" method="post" th:action="@{/register-model-switch}" th:object="${modelSwitchDTO}">
                                    <ul id="progressreg">
                                        <li class="reg" id="register"><strong>Modelo</strong></li>
                                        <li id="end"><strong></strong></li>
                                    </ul>
                                    <div class="progress">
                                        <div class="progress-bar progress-bar-striped progress-bar-animated" role="progressbar" aria-valuemin="0" aria-valuemax="100"></div>
                                    </div> <br>
                                    <fieldset>
                                        <div class="form-card">
                                            <div class="row">
                                                <div class="col-7">
                                                    <h2 class="fs-title">Registrar Modelo de Switch</h2>
                                                </div>
                                                <div class="col-5">
                                                    <h2 class="steps">Step 1 - 1</h2>
                                                </div>
                                            </div>
                                            <div class="bg-light p-3 border">
                                                <div class="alert alert-info text-center" th:if="${message}" th:text="${message}"></div>
                                                <div class="form-row py-1">
                                                    <label for="modelswitch">Modelo: <label class="required-text">*</label></label>
                                                    <input type="text" placeholder="Ingrese el modelo del Switch" id="modelswitch" class="form-control" name="modelswitch" th:value="*{modelswitch}" th:errorClass="is-invalid">
                                                    <div th:if="${#fields.hasErrors('modelswitch')}" th:errors="*{modelswitch}" class="invalid-feedback"></div>
                                                </div>
                                                <div class="form-row py-1">
                                                    <label for="brand">Marca: <label class="required-text">*</label></label>
                                                    <input type="text" placeholder="Ingrese la marca del Switch" id="brand" class="form-control" name="brand" th:value="*{brand}" th:errorClass="is-invalid">
                                                    <div th:if="${#fields.hasErrors('brand')}" th:errors="*{brand}" class="invalid-feedback"></div>
                                                </div>
                                                <div class="form-row py-1">
                                                    <label for="enabled">Modelo Activo: <label class="required-text">*</label></label>
                                                    <select id="enabled" class="form-select" th:value="*{enabled}" name="enabled">
                                                        <option value="TRUE">SI</option>
                                                        <option value="FALSE">NO</option>
                                                    </select>
                                                    <div th:if="${#fields.hasErrors('enabled')}" th:errors="*{enabled}" class="invalid-feedback"></div>
                                                </div>
                                            </div>
                                        </div>
                                        <input type="submit"  class="action-button" value="GUARDAR"/>
                                    </fieldset>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>
</div>
